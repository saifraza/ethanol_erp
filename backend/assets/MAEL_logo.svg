<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a74a"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </radialGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="#6b4400" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Wheat stalks (left) -->
  <g transform="translate(55,45) rotate(15)">
    <line x1="0" y1="80" x2="0" y2="20" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
    <ellipse cx="-5" cy="30" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(-20)"/>
    <ellipse cx="-4" cy="42" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(-15)"/>
    <ellipse cx="-3" cy="54" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(-10)"/>
    <ellipse cx="5" cy="35" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(20)"/>
    <ellipse cx="4" cy="47" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(15)"/>
  </g>
  <!-- Wheat stalks (right) -->
  <g transform="translate(145,45) rotate(-15)">
    <line x1="0" y1="80" x2="0" y2="20" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
    <ellipse cx="5" cy="30" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(20)"/>
    <ellipse cx="4" cy="42" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(15)"/>
    <ellipse cx="3" cy="54" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(10)"/>
    <ellipse cx="-5" cy="35" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(-20)"/>
    <ellipse cx="-4" cy="47" rx="4" ry="8" fill="#fff" opacity="0.6" transform="rotate(-15)"/>
  </g>
  <!-- MA text -->
  <text x="100" y="110" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle">MA</text>
  <!-- AGRI ENERGY -->
  <text x="100" y="138" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="3">AGRI ENERGY</text>
  <!-- Bottom ring text -->
  <text x="100" y="170" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">LLP</text>
</svg>