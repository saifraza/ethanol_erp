<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a8a5c"/>
      <stop offset="100%" stop-color="#1b5e3b"/>
    </radialGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="#0a3d1f" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Leaf (left) -->
  <g transform="translate(60,40) rotate(20)">
    <path d="M0,70 Q-15,35 0,5 Q15,35 0,70Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="0" y1="70" x2="0" y2="10" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  </g>
  <!-- Leaf (right) -->
  <g transform="translate(140,40) rotate(-20)">
    <path d="M0,70 Q-15,35 0,5 Q15,35 0,70Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="0" y1="70" x2="0" y2="10" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  </g>
  <!-- MG text -->
  <text x="100" y="110" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle">MG</text>
  <!-- GREEN AGRI -->
  <text x="100" y="138" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="3">GREEN AGRI</text>
  <!-- Bottom ring text -->
  <text x="100" y="170" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">LLP</text>
</svg>