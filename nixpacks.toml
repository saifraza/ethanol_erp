[phases.setup]
aptPkgs = [
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2t64",
  "libxshmfence1",
  "libxfixes3",
  "libxext6",
  "libx11-6",
  "libx11-xcb1",
  "libxcb1",
  "libxcursor1",
  "libxi6",
  "libxtst6",
  "libglib2.0-0",
  "libdbus-1-3",
  "fonts-noto",
  "fonts-noto-cjk"
]

[phases.build]
# The full build (backend tsc + prisma + frontend vite) already runs during
# the install phase via package.json's `postinstall: npm run build` hook.
# Without this override, nixpacks would auto-detect and run a second build,
# which OOM-killed the container on 2026-05-02 (Railway log ended silently
# after the source COPY — classic kernel-OOM signature, no error message).
# A no-op build phase keeps the install-time build artifacts in the image.
cmds = ["echo 'Build performed during install via postinstall hook'"]

[variables]
# Let pdfRenderer.ts auto-detect Chromium path (system or bundled)
# Headroom for tsc + vite build combined (default Node heap is ~1.5GB).
NODE_OPTIONS = "--max-old-space-size=4096"
