<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSPIL Weighbridge - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { width: 360px; }
        .login-header { background: #1e293b; padding: 20px; text-align: center; }
        .login-header h1 { color: white; font-size: 16px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
        .login-header p { color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
        .login-form { background: white; border: 1px solid #cbd5e1; padding: 24px; }
        .login-form label { display: block; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
        .login-form input { width: 100%; border: 1px solid #cbd5e1; padding: 10px 12px; font-size: 14px; margin-bottom: 16px; outline: none; }
        .login-form input:focus { border-color: #94a3b8; box-shadow: inset 0 0 0 1px #94a3b8; }
        .login-form button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; }
        .login-form button:hover { background: #1d4ed8; }
        .login-form button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 8px 12px; font-size: 12px; margin-bottom: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <h1>MSPIL Weighbridge</h1>
            <p>Mahakaushal Sugar & Power Industries Ltd</p>
        </div>
        <form class="login-form" onsubmit="doLogin(event)">
            <div class="error" id="error"></div>
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" autofocus autocomplete="username">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
            <button type="submit" id="btn">Login</button>
        </form>
    </div>
    <script>
    async function doLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('btn');
        const errEl = document.getElementById('error');
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Logging in...';
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                })
            });
            const data = await res.json();
            if (res.ok) {
                window.location.href = '/';
            } else {
                errEl.textContent = data.error || 'Login failed';
                errEl.style.display = 'block';
            }
        } catch(err) {
            errEl.textContent = 'Connection error. Check network.';
            errEl.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Login';
    }
    </script>
</body>
</html>
