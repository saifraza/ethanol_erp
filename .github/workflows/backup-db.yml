name: Backup Cloud DB

on:
  push:
    branches: [main]

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not set. Add it in repo Settings → Secrets."
            exit 1
          fi
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          pg_dump "$DATABASE_URL" \
            --no-owner --no-acl \
            --format=custom \
            --compress=9 \
            -f "mspil-erp-backup-${TIMESTAMP}.dump"
          ls -lh mspil-erp-backup-*.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.sha }}
          path: mspil-erp-backup-*.dump
          retention-days: 90
