<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #64748b; margin-bottom: 10px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.demo { background: #fff; border: 1px solid #e2e8f0; padding: 12px 14px; }
.demo .h { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; font-family: ui-monospace, Menlo, monospace; }
</style></head><body><div class="card-root">
<div class="label">Type · Signature Patterns</div>
<div class="grid">
  <div class="demo">
    <div class="h">Page title (toolbar)</div>
    <div style="background:#1e293b;color:#fff;padding:10px 14px;font-size:14px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase">Inventory Dashboard</div>
  </div>
  <div class="demo">
    <div class="h">KPI</div>
    <div style="background:#fff;border-left:4px solid #2563eb;padding:4px 12px">
      <div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase">Total Value</div>
      <div style="font-size:20px;font-weight:700;color:#1e293b;font-family:ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums">₹4,28,91,450</div>
    </div>
  </div>
  <div class="demo">
    <div class="h">Table header</div>
    <div style="background:#1e293b;color:#fff;padding:6px 10px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;display:flex;gap:20px"><span>Item</span><span>Qty</span><span>Value</span></div>
  </div>
  <div class="demo">
    <div class="h">Badge</div>
    <div style="display:flex;gap:6px"><span style="font-size:9px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:3px 6px;border:1px solid #86efac;background:#d1fae5;color:#065f46">Posted</span><span style="font-size:9px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:3px 6px;border:1px solid #fcd34d;background:#fef3c7;color:#92400e">Pending</span></div>
  </div>
</div>
</div></body></html>
