<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
.sw { aspect-ratio: 1/1; border-radius: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; font-size: 10px; line-height: 1.2; color: #0f172a; }
.sw.dark { color: #fff; }
.sw .name { font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; font-size: 9px; }
.sw .hex { font-family: ui-monospace, Menlo, monospace; font-size: 9px; opacity: 0.85; }
.label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #64748b; margin-bottom: 10px; display: flex; align-items: baseline; gap: 10px; }
.label .rule { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: #94a3b8; text-transform: none; letter-spacing: 0; }
.featured { display: flex; gap: 12px; margin-top: 14px; align-items: stretch; }
.featured .chip { background: #2563eb; color: #fff; padding: 10px 14px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
.featured .chip.hv { background: #1d4ed8; }
.featured .chip .k { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.85; }
</style></head><body><div class="card-root">
<div class="label">Primary · Blue <span class="rule">Actions, nav, links. Tailwind <code>primary-*</code>. Never on status badges.</span></div>
<div class="row">
  <div class="sw" style="background:#eff6ff"><span class="name">50</span><span class="hex">#eff6ff</span></div>
  <div class="sw" style="background:#dbeafe"><span class="name">100</span><span class="hex">#dbeafe</span></div>
  <div class="sw" style="background:#bfdbfe"><span class="name">200</span><span class="hex">#bfdbfe</span></div>
  <div class="sw" style="background:#93c5fd"><span class="name">300</span><span class="hex">#93c5fd</span></div>
  <div class="sw" style="background:#60a5fa"><span class="name">400</span><span class="hex">#60a5fa</span></div>
  <div class="sw dark" style="background:#3b82f6"><span class="name">500</span><span class="hex">#3b82f6</span></div>
  <div class="sw dark" style="background:#2563eb"><span class="name">600★</span><span class="hex">#2563eb</span></div>
  <div class="sw dark" style="background:#1d4ed8"><span class="name">700</span><span class="hex">#1d4ed8</span></div>
  <div class="sw dark" style="background:#1e40af"><span class="name">800</span><span class="hex">#1e40af</span></div>
  <div class="sw dark" style="background:#1e3a8a"><span class="name">900</span><span class="hex">#1e3a8a</span></div>
</div>
<div class="featured">
  <span class="chip"><span class="k">Default</span> blue-600</span>
  <span class="chip hv"><span class="k">Hover</span> blue-700</span>
  <span class="chip" style="background:#3b82f6"><span class="k">Accent / chart</span> blue-500</span>
  <span class="chip" style="background:#eff6ff;color:#1d4ed8"><span class="k" style="opacity:1;color:#2563eb">Hover tint</span> blue-50</span>
</div>
</div></body></html>
