<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #64748b; margin-bottom: 12px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cell { }
.cell .hk { font-size: 9px; color: #94a3b8; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-family: ui-monospace, Menlo, monospace; margin-bottom: 6px; }
.l { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; display: block; }
input.t2 { width: 100%; border: 1px solid #cbd5e1; padding: 6px 10px; font-size: 12px; background: #fff; outline: 0; }
input.t2:focus { border-color: #64748b; box-shadow: 0 0 0 1px #94a3b8; }
input.auto { width: 100%; background: #f0fdf4; border: 1px solid #86efac; padding: 6px 10px; font-size: 12px; color: #166534; font-weight: 500; }
input.t1 { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px 12px; font-size: 16px; background: #fff; outline: 0; }
input.t1:focus { border-color: #64748b; box-shadow: 0 0 0 1px #94a3b8; }
</style></head><body><div class="card-root">
<div class="label">Form inputs</div>
<div class="grid">
  <div class="cell">
    <div class="hk">Tier 2 · Default</div>
    <span class="l">Vendor</span><input class="t2" value="Mahakaushal Distillery Pvt Ltd"/>
  </div>
  <div class="cell">
    <div class="hk">Tier 2 · Focused</div>
    <span class="l">PO No.</span><input class="t2" style="border-color:#64748b;box-shadow:0 0 0 1px #94a3b8" value="PO-2026-0412"/>
  </div>
  <div class="cell">
    <div class="hk">Tier 2 · Auto / computed</div>
    <span class="l">GST (18 %)</span><input class="auto" value="₹ 21,150" readonly/>
  </div>
  <div class="cell">
    <div class="hk">Tier 1 · Plant (16px · iOS)</div>
    <span class="l" style="font-size:13px;text-transform:none;letter-spacing:0;color:#374151;font-weight:500">Dosing — lactic acid (L)</span><input class="t1" value="24.0"/>
  </div>
</div>
</div></body></html>
