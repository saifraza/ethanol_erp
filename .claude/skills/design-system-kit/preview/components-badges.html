<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #64748b; margin-bottom: 12px; }
.row { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 7px; border: 1px solid; }
.chip { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; padding: 4px 10px; }
.sub { font-size: 9px; color: #94a3b8; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-family: ui-monospace, Menlo, monospace; margin: 14px 0 6px; }
</style></head><body><div class="card-root">
<div class="label">Badges &amp; Chips</div>
<div class="sub">Tier 2 — status badges (bordered, rectangular)</div>
<div class="row">
  <span class="badge" style="border-color:#86efac;background:#d1fae5;color:#065f46">Posted</span>
  <span class="badge" style="border-color:#93c5fd;background:#dbeafe;color:#1e40af">Draft</span>
  <span class="badge" style="border-color:#fcd34d;background:#fef3c7;color:#92400e">Pending</span>
  <span class="badge" style="border-color:#fca5a5;background:#fee2e2;color:#991b1b">Cancelled</span>
  <span class="badge" style="border-color:#cbd5e1;background:#f1f5f9;color:#334155">Closed</span>
  <span class="badge" style="border-color:#a7f3d0;background:#ecfdf5;color:#065f46">Paid</span>
  <span class="badge" style="border-color:#c4b5fd;background:#ede9fe;color:#5b21b6">E-Invoiced</span>
  <span class="badge" style="border-color:#fdba74;background:#ffedd5;color:#9a3412">Hold</span>
</div>
<div class="sub">Tier 1 — process phase chips (solid, fermentation standard)</div>
<div class="row">
  <span class="chip" style="background:#6366f1">Filling</span>
  <span class="chip" style="background:#f59e0b">Dosing</span>
  <span class="chip" style="background:#22c55e">Reaction</span>
  <span class="chip" style="background:#10b981">Lab</span>
  <span class="chip" style="background:#06b6d4">Retention</span>
  <span class="chip" style="background:#3b82f6">Transfer</span>
  <span class="chip" style="background:#8b5cf6">CIP</span>
  <span class="chip" style="background:#6b7280">Done</span>
</div>
</div></body></html>
