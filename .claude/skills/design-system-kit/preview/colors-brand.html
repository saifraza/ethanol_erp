<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #64748b; margin-bottom: 10px; display: flex; align-items: baseline; gap: 10px; }
.label .rule { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: #94a3b8; text-transform: none; letter-spacing: 0; }
.row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.col { border: 1px solid #e2e8f0; background: #fff; }
.col .big { height: 80px; display: flex; align-items: flex-end; padding: 10px; color: #fff; font-weight: 700; letter-spacing: 0.1em; font-size: 11px; text-transform: uppercase; }
.col .meta { padding: 10px 12px 12px; font-size: 10px; line-height: 1.5; color: #475569; }
.col .meta b { color: #0f172a; font-family: ui-monospace, Menlo, monospace; font-size: 10px; }
</style></head><body><div class="card-root">
<div class="label">Brand Colors <span class="rule">From the MSPIL logo — accent use only, not UI actions</span></div>
<div class="row">
  <div class="col">
    <div class="big" style="background:#8DC641">MSPIL Green</div>
    <div class="meta"><b>#8DC641</b><br>Sugarcane ring. Brand accent, not action.</div>
  </div>
  <div class="col">
    <div class="big" style="background:#1E3A8A">MSPIL Navy</div>
    <div class="meta"><b>#1E3A8A</b><br>Wordmark. Matches primary-900.</div>
  </div>
  <div class="col">
    <div class="big" style="background:#A7A9AC;color:#0f172a">Steel Grey</div>
    <div class="meta"><b>#A7A9AC</b><br>Gear cog. Industrial texture cue.</div>
  </div>
</div>
</div></body></html>
